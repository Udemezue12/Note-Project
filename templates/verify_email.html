{% load static %}
{% extends "base.html" %} 
{% block title %}Verify Email — Mnemo{% endblock %}
{%block body %}
<div class="auth-page">
  <div class="auth-bg"></div>

  <div class="auth-card">
    <div class="auth-logo">Mn<em>e</em>mo</div>
    <div class="auth-tagline">// one last step</div>

    <div
      style="
        text-align: center;
        margin-bottom: 24px;
        font-size: 2.5rem;
        opacity: 0.6;
      "
    >
      ✉
    </div>

    <div
      id="auth-response"
      style="
        display: none;
        font-size: 0.72rem;
        font-family: var(--mono);
        padding: 8px 12px;
        border-radius: 4px;
        margin-bottom: 12px;
      "
    ></div>

    <form
      id="verify-form"
      hx-post="/api/v1/auth/verify-email/"
      hx-ext="json-enc"
      hx-on::before-request="beginVerify()"
      hx-on::after-request="handleVerifyResponse(event)"
    >
      {% csrf_token %}

      <div id="verify-otp-field" class="auth-field">
        <label class="auth-label">Verification OTP</label>
        <input
          class="auth-input"
          name="otp"
          id="verify-otp"
          type="text"
          inputmode="numeric"
          maxlength="6"
          placeholder="123456"
          style="
            letter-spacing: 0.4em;
            font-family: var(--mono);
            font-size: 1.1rem;
            text-align: center;
          "
        />
      </div>

      <input type="hidden" name="token" id="verify-token" />

      <button type="submit" class="auth-submit" id="verify-btn">
        <span id="verify-btn-text">Verify Email</span>
        <span class="spinner htmx-indicator"></span>
      </button>
    </form>

    <div style="margin-top: 16px; text-align: center">
      <button
        type="button"
        onclick="openResendModal()"
        style="
          font-size: 0.7rem;
          font-family: var(--mono);
          color: var(--mist);
          border: 1px dashed var(--ink-4);
          border-radius: 4px;
          padding: 5px 12px;
          transition: all 0.15s;
        "
        onmouseover="
          this.style.color = 'var(--ember)';
          this.style.borderColor = 'var(--ember)';
        "
        onmouseout="
          this.style.color = 'var(--mist)';
          this.style.borderColor = 'var(--ink-4)';
        "
      >
        Resend verification email
      </button>
    </div>

    <div class="auth-footer">
      <a href="{% url 'login' %}" class="auth-link">← Back to sign in</a>
    </div>
  </div>
</div>

<!-- RESEND MODAL -->
<div
  id="resend-modal"
  style="
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.55);
    z-index: 999;
  "
>
  <div
    style="
      width: 340px;
      background: var(--ink-2);
      border: 1px solid var(--ink-4);
      border-radius: 6px;
      padding: 22px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      animation: modalIn 0.18s ease;
    "
  >
    <div
      style="
        font-family: var(--mono);
        font-size: 0.72rem;
        color: var(--mist);
        margin-bottom: 14px;
      "
    >
      Enter your email to resend the verification link
    </div>

    <input
      id="resend-email"
      type="email"
      placeholder="you@example.com"
      style="
        width: 100%;
        padding: 8px 10px;
        background: var(--ink-3);
        border: 1px solid var(--ink-4);
        border-radius: 4px;
        color: var(--paper);
        font-family: var(--mono);
        font-size: 0.75rem;
        margin-bottom: 14px;
      "
    />
    <div
      id="resend-response"
      style="
        display: none;
        font-size: 0.72rem;
        font-family: var(--mono);
        padding: 8px 12px;
        border-radius: 4px;
        margin-bottom: 12px;
      "
    ></div>

    <div style="display: flex; gap: 8px; justify-content: flex-end">
      <button
        type="button"
        onclick="closeResendModal()"
        style="
          font-family: var(--mono);
          font-size: 0.7rem;
          padding: 6px 10px;
          background: transparent;
          border: 1px solid var(--ink-4);
          border-radius: 4px;
          color: var(--mist);
        "
      >
        Cancel
      </button>

      <button
        type="button"
        onclick="submitResend()"
        style="
          font-family: var(--mono);
          font-size: 0.7rem;
          padding: 6px 12px;
          background: var(--ink-3);
          border: 1px solid var(--ink-4);
          border-radius: 4px;
          color: var(--paper);
        "
      >
        Send Link
      </button>
    </div>
  </div>
</div>

<style>
  @keyframes modalIn {
    from {
      transform: scale(0.94);
      opacity: 0;
    }
    to {
      transform: scale(1);
      opacity: 1;
    }
  }
</style>

{% endblock %} 
{% block extra_scripts %}
<script src="{% static 'js/verify_email.js' %}"></script>

{% endblock %}

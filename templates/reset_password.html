{% extends "base.html" %}
{% load static %}
{% block title %}Reset Password — Mnemo{% endblock %}

{% block body %}
<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo">Mn<em>e</em>mo</div>
    <div class="auth-tagline">// choose a new password</div>

    <div id="auth-response"
      style="display:none;font-size:0.72rem;font-family:var(--mono);
      padding:8px 12px;border-radius:4px;margin-bottom:12px;">
    </div>

    <form
      id="reset-form"
      hx-post="/api/v1/auth/reset_password/"
      hx-on::before-request="beginReset(event)"
      hx-on::after-request="handleResetResponse(event)"
    >
      {% csrf_token %}

      <!-- OTP -->
      <div id="otp-field" class="auth-field">
        <label class="auth-label">6-Digit OTP</label>
        <input
          class="auth-input"
          name="otp"
          id="otp-input"
          type="text"
          maxlength="6"
          inputmode="numeric"
          pattern="[0-9]{6}"
          placeholder="123456"
        />
      </div>

      <!-- TOKEN -->
      <input type="hidden" name="token" id="token-input" />

      <div class="auth-field">
        <label class="auth-label">New Password</label>
        <input
          class="auth-input"
          name="new_password"
          id="new-password"
          type="password"
          required
        />
      </div>

      <div class="auth-field">
        <label class="auth-label">Confirm New Password</label>
        <input
          class="auth-input"
          name="confirm_password"
          id="confirm-new-password"
          type="password"
          required
        />
      </div>

      <button type="submit" class="auth-submit" id="reset-btn">
        <span id="reset-btn-text">Reset Password</span>
        <span class="spinner htmx-indicator"></span>
      </button>
    </form>

    <div class="auth-footer">
      <a href="{% url 'login' %}" class="auth-link">← Back to sign in</a>
      &nbsp;·&nbsp;
      <a href={% url "forgot_password" %} class="auth-link">Resend link</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'js/reset_password.js' %}"></script>

{% endblock %}

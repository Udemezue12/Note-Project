{% extends "base.html" %} 
{% load static %}
{% block title %}Forgot Password — Mnemo{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo">Mn<em>e</em>mo</div>
    <div class="auth-tagline">// we'll send you a reset link</div>

    <div
      id="auth-response"
      style="
        display: none;
        font-size: 0.72rem;
        font-family: var(--mono);
        padding: 8px 12px;
        border-radius: 4px;
        margin-bottom: 12px;
      "
    ></div>

    <form
      id="forgot-form"
      hx-post="/api/v1/auth/forgot_password/"
      hx-ext="json-enc"
      hx-on::before-request="beginForgot()"
      hx-on::after-request="handleForgotResponse(event)"
    >
      {% csrf_token %}

      <div class="auth-field">
        <label class="auth-label" for="email">Email Address</label>
        <input
          class="auth-input"
          id="email"
          name="email"
          type="email"
          placeholder="you@example.com"
          required
        />
      </div>

      <button type="submit" class="auth-submit" id="forgot-btn">
        <span id="forgot-btn-text">Send Reset Link</span>
        <span class="spinner htmx-indicator"></span>
      </button>
    </form>

    <div class="auth-footer">
      <a href="{% url 'login' %}" class="auth-link">← Back to sign in</a>
    </div>
  </div>
</div>
{% endblock %} 
{% block extra_scripts %}
<script src="{% static 'js/forgot_password.js' %}"></script>

{% endblock %}

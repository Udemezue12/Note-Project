[supervisord]
nodaemon=true
loglevel=info
user=root

[program:web]
directory=/app
command=daphne -b 0.0.0.0 -p $PORT note_app.asgi:application
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
startsecs=5
stopwaitsecs=15

[program:celery]
directory=/app
environment=PYTHONPATH="/app",DJANGO_SETTINGS_MODULE="note_app.settings"
command=celery -A note_app.celery_app.app worker --loglevel=info --pool=solo --without-gossip --without-mingle --without-heartbeat
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
startsecs=10
stopwaitsecs=60
startretries=3
exitcodes=0,2

[program:celery_beat]
directory=/app
environment=PYTHONPATH="/app",DJANGO_SETTINGS_MODULE="note_app.settings"
command=celery -A note_app.celery_app.app beat --loglevel=info
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
startsecs=10
stopwaitsecs=60
startretries=3
exitcodes=0,2